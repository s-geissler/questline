{% extends "base.html" %}
{% block content %}

<div id="home-page" class="max-w-5xl mx-auto p-6">

  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-white">Hubs</h1>
    <button
      type="button"
      data-action="open-create"
      class="bg-white text-blue-700 font-semibold px-4 py-2 rounded-lg hover:bg-blue-50 transition-colors shadow"
    >+ New Hub</button>
  </div>

  <!-- Create form -->
  <div id="home-create-form" class="hidden bg-white rounded-xl shadow p-4 mb-6">
    <div class="flex gap-3">
      <input
        id="home-new-board-name"
        placeholder="Hub name..."
        class="flex-1 border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
      >
      <button
        type="button"
        data-action="create-board"
        class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors"
      >Create</button>
      <button
        type="button"
        data-action="cancel-create"
        class="text-gray-500 hover:text-gray-700 px-3 py-2 text-sm"
      >Cancel</button>
    </div>
  </div>

  <!-- Boards grid -->
  <div id="home-boards-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>

  <p id="home-empty-state" class="hidden text-white text-center opacity-70 py-12">
    No hubs yet. Create one to get started.
  </p>

</div>

<script src="/static/home.js"></script>

{% endblock %}
