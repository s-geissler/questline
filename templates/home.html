{% extends "base.html" %}
{% block content %}

<div x-data="homePage()" x-init="init()" x-cloak class="max-w-5xl mx-auto p-6">

  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-white">Hubs</h1>
    <button
      @click="showCreate = true; $nextTick(() => $refs.newBoardName.focus())"
      class="bg-white text-blue-700 font-semibold px-4 py-2 rounded-lg hover:bg-blue-50 transition-colors shadow"
    >+ New Hub</button>
  </div>

  <!-- Create form -->
  <div x-show="showCreate" class="bg-white rounded-xl shadow p-4 mb-6">
    <div class="flex gap-3">
      <input
        x-ref="newBoardName"
        x-model="newName"
        @keydown.enter="createBoard()"
        @keydown.escape="showCreate = false; newName = ''"
        placeholder="Hub name..."
        class="flex-1 border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
      >
      <button
        @click="createBoard()"
        class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors"
      >Create</button>
      <button
        @click="showCreate = false; newName = ''"
        class="text-gray-500 hover:text-gray-700 px-3 py-2 text-sm"
      >Cancel</button>
    </div>
  </div>

  <!-- Boards grid -->
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
    <template x-for="board in boards" :key="board.id">
      <div class="bg-white rounded-xl shadow hover:shadow-md transition-shadow overflow-visible flex flex-col">
        <!-- Board color header -->
        <a :href="'/board/' + board.id"
           class="block p-5 h-24 flex items-end hover:opacity-90 transition-opacity"
           :style="'background:' + (board.color || '#2563eb')">
          <div class="flex items-end justify-between gap-3 w-full">
            <span class="text-white font-bold text-base leading-tight drop-shadow" x-text="board.name"></span>
            <span
              x-show="board.role"
              class="text-[11px] px-1.5 py-0.5 rounded-full text-white font-medium border flex-shrink-0"
              :class="board.role === 'admin'
                ? 'bg-fuchsia-400/25 border-fuchsia-200/30'
                : (board.role === 'owner'
                  ? 'bg-white/20 border-white/25'
                : (board.role === 'editor'
                  ? 'bg-amber-400/25 border-amber-200/30'
                  : 'bg-emerald-400/25 border-emerald-200/30'))"
              x-text="board.role.charAt(0).toUpperCase() + board.role.slice(1)"
            ></span>
          </div>
        </a>
        <!-- Footer: owner actions -->
        <div class="px-3 py-2 border-t" x-show="board.role === 'owner' || board.role === 'admin'">
          <template x-if="board.editing">
            <input
              :id="'rename-' + board.id"
              x-model="board.editName"
              @blur="saveBoardName(board)"
              @keydown.enter="$el.blur()"
              @keydown.escape="board.editing = false; board.editName = board.name"
              class="w-full text-sm border-b border-blue-400 focus:outline-none py-0.5 bg-transparent"
              @click.prevent.stop
            >
          </template>
          <div x-show="!board.editing" x-data="{ open: false }" @click.outside="open = false" class="relative flex justify-end">
            <button
              @click.prevent.stop="open = !open"
              class="text-gray-400 hover:text-gray-600 px-2 py-1 rounded hover:bg-gray-100 transition-colors text-lg leading-none"
              title="Hub actions"
            >☰</button>
            <div
              x-show="open"
              x-cloak
              x-transition:enter="transition ease-out duration-100"
              x-transition:enter-start="opacity-0 scale-95"
              x-transition:enter-end="opacity-100 scale-100"
              x-transition:leave="transition ease-in duration-75"
              x-transition:leave-start="opacity-100 scale-100"
              x-transition:leave-end="opacity-0 scale-95"
              class="absolute top-full right-0 mt-1 bg-white text-gray-800 shadow-xl rounded-xl py-1 min-w-[140px] z-20"
            >
              <button
                @click.prevent.stop="startEdit(board); open = false"
                class="block w-full text-left text-xs text-gray-600 hover:text-blue-600 px-3 py-2 hover:bg-gray-100 transition-colors"
              >Rename</button>
              <button
                @click.prevent.stop="deleteBoard(board); open = false"
                class="block w-full text-left text-xs text-gray-600 hover:text-red-600 px-3 py-2 hover:bg-gray-100 transition-colors"
              >Delete</button>
            </div>
          </div>
        </div>
      </div>
    </template>

    <p x-show="boards.length === 0" class="col-span-4 text-white text-center opacity-70 py-12">
      No hubs yet. Create one to get started.
    </p>
  </div>

</div>

<script>
function homePage() {
  return {
    boards: [],
    showCreate: false,
    newName: '',

    async init() {
      const res = await fetch('/api/boards');
      this.boards = (await res.json()).map(b => ({...b, editing: false, editName: b.name}));
    },

    async createBoard() {
      if (!this.newName.trim()) return;
      const res = await fetch('/api/boards', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name: this.newName.trim()}),
      });
      if (!res.ok) return;
      const board = await res.json();
      this.boards.push({...board, editing: false, editName: board.name});
      this.newName = '';
      this.showCreate = false;
    },

    startEdit(board) {
      board.editing = true;
      board.editName = board.name;
      this.$nextTick(() => document.getElementById('rename-' + board.id)?.focus());
    },

    async saveBoardName(board) {
      if (!board.editName.trim() || board.editName.trim() === board.name) {
        board.editing = false;
        return;
      }
      const res = await fetch(`/api/boards/${board.id}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name: board.editName.trim()}),
      });
      if (!res.ok) {
        board.editName = board.name;
        board.editing = false;
        return;
      }
      board.name = board.editName.trim();
      board.editing = false;
    },

    async deleteBoard(board) {
      if (!confirm(`Delete hub "${board.name}" and all its content?`)) return;
      const res = await fetch(`/api/boards/${board.id}`, {method: 'DELETE'});
      if (!res.ok) return;
      this.boards = this.boards.filter(b => b.id !== board.id);
    },
  };
}
</script>

{% endblock %}
