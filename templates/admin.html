{% extends "base.html" %}
{% block content %}

<div x-data="adminPage()" x-init="init()" x-cloak class="max-w-5xl mx-auto p-6">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-white">Admin</h1>
      <p class="text-white/75 text-sm mt-1">Manage Questline user accounts and instance-wide admin access.</p>
    </div>
  </div>

  <div class="bg-white rounded-xl shadow overflow-hidden">
    <div class="grid grid-cols-[1.4fr_1.4fr_0.9fr_0.8fr] gap-4 px-5 py-3 border-b text-xs font-semibold text-gray-400 uppercase tracking-wide">
      <div>User</div>
      <div>Email</div>
      <div>Boards</div>
      <div>Role</div>
    </div>

    <template x-for="user in users" :key="user.id">
      <div class="grid grid-cols-[1.4fr_1.4fr_0.9fr_0.8fr] gap-4 px-5 py-3 border-b items-center">
        <div class="min-w-0">
          <div class="text-sm font-medium text-gray-800" x-text="user.display_name"></div>
          <div x-show="user.id === currentUserId" class="text-xs text-blue-500 mt-0.5">You</div>
        </div>
        <div class="text-sm text-gray-600 truncate" x-text="user.email"></div>
        <div class="text-sm text-gray-500" x-text="user.board_count"></div>
        <div>
          <select
            :value="user.role"
            @change="updateUserRole(user, $event.target.value)"
            class="w-full border rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
          >
            <option value="user">User</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>
    </template>
  </div>

  <p x-show="error" x-text="error" class="mt-4 text-sm text-red-500"></p>
</div>

<script>
function adminPage() {
  return {
    currentUserId: {{ current_user.id }},
    users: [],
    error: '',

    async init() {
      const res = await fetch('/api/admin/users');
      if (!res.ok) {
        this.error = 'Unable to load users';
        return;
      }
      this.users = await res.json();
    },

    async updateUserRole(user, role) {
      this.error = '';
      const previousRole = user.role;
      user.role = role;
      const res = await fetch(`/api/admin/users/${user.id}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({role}),
      });
      if (!res.ok) {
        const data = await res.json();
        this.error = data.detail || 'Unable to update user role';
        user.role = previousRole;
        return;
      }
      const updated = await res.json();
      user.role = updated.role;
    },
  };
}
</script>

{% endblock %}
