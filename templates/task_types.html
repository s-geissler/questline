{% extends "base.html" %}
{% block content %}

<div
  id="task-types-page"
  class="max-w-4xl mx-auto p-6"
  data-board-id="{{ board.id }}"
  data-board-role='{{ board_role | tojson }}'
  data-boards='{{ boards | tojson }}'
>
  <div id="task-types-readonly-banner" class="hidden mb-6 bg-white/85 text-slate-700 text-sm rounded-xl px-4 py-3 shadow">
    Read-only access. Viewers can inspect objective types but cannot change them.
  </div>

  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-white">Objective Types</h1>
    <button
      id="task-types-new-button"
      type="button"
      class="hidden bg-white text-blue-700 font-semibold px-4 py-2 rounded-lg hover:bg-blue-50 transition-colors shadow"
    >+ New Type</button>
  </div>

  <div id="task-types-create-container"></div>
  <div id="task-types-list-container" class="space-y-4"></div>
  <p id="task-types-empty-state" class="hidden text-white text-center opacity-70 py-8">
    No objective types yet. Create one to get started.
  </p>
</div>

<script src="/static/custom_fields.js"></script>
<script src="/static/task_types.js"></script>

{% endblock %}
