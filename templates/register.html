{% extends "base.html" %}
{% block content %}

<div x-data="registerPage()" class="max-w-md mx-auto p-6">
  <div class="bg-white rounded-xl shadow p-6">
    <h1 class="text-xl font-bold text-gray-800 mb-5">Register</h1>

    <div class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Display Name</label>
        <input
          x-model="displayName"
          @keydown.enter="register()"
          class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Email</label>
        <input
          x-model="email"
          type="email"
          @keydown.enter="register()"
          class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Password</label>
        <input
          x-model="password"
          type="password"
          @keydown.enter="register()"
          class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
      </div>
      <p x-show="error" x-text="error" class="text-sm text-red-500"></p>
      <div class="flex justify-end gap-2 pt-2">
        <a href="/login" class="text-sm text-gray-500 hover:text-gray-700 px-3 py-2">Login</a>
        <button
          @click="register()"
          class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors"
        >Create Account</button>
      </div>
    </div>
  </div>
</div>

<script>
function registerPage() {
  return {
    displayName: '',
    email: '',
    password: '',
    error: '',

    async register() {
      this.error = '';
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          display_name: this.displayName,
          email: this.email,
          password: this.password,
        }),
      });
      if (!res.ok) {
        const data = await res.json();
        this.error = data.detail || 'Registration failed';
        return;
      }
      window.location.href = '/';
    },
  };
}
</script>

{% endblock %}
