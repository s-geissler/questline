{% extends "base.html" %}
{% block content %}

<div id="login-root" class="max-w-md mx-auto p-6">
  <div class="bg-white rounded-xl shadow p-6">
    <h1 class="text-xl font-bold text-gray-800 mb-5">Login</h1>

    <div class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Email</label>
        <input
          id="login-email-input"
          type="email"
          class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Password</label>
        <input
          id="login-password-input"
          type="password"
          class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
      </div>
      <p id="login-error" class="hidden text-sm text-red-500"></p>
      <p id="login-success" class="hidden text-sm text-green-600"></p>
      <div class="flex justify-end gap-2 pt-2">
        <a href="/register" class="text-sm text-gray-500 hover:text-gray-700 px-3 py-2">Register</a>
        <button
          id="login-submit"
          class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors"
        >Login</button>
      </div>
      <div class="pt-1">
        <button
          id="login-request-recovery"
          type="button"
          class="text-sm text-gray-500 hover:text-gray-700"
        >Need password help? Notify an admin.</button>
      </div>
    </div>
  </div>
</div>

<script src="/static/auth.js"></script>

{% endblock %}
