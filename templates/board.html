{% extends "base.html" %}

{% block nav_extra %}
<button id="board-settings-button" class="nav-utility">
  ⚙ Settings
</button>
{% endblock %}

{% block content %}

<div
  x-data="board"
  x-init="init"
  x-cloak
  data-board-id="{{ board.id }}"
  data-boards='{{ boards | tojson }}'
  data-board-name='{{ board.name | tojson }}'
  data-board-color='{{ (board.color or "") | tojson }}'
  data-board-role='{{ board_role | tojson }}'
>

  <div id="board-readonly-banner" class="hidden mx-auto max-w-5xl px-6 pt-4" x-ignore></div>

  <div id="board-view-toggle" class="fixed top-16 right-4 z-30 flex flex-col items-end gap-2" x-ignore></div>

  <div id="board-calendar-toolbar" class="fixed top-16 left-1/2 -translate-x-1/2 z-20 hidden" x-ignore></div>

  <div id="board-stages-view" class="p-4 overflow-auto h-[calc(100vh-4rem)]" x-ignore></div>

  <div id="board-calendar-view" class="hidden p-4 pt-24" x-ignore></div>

  <div id="board-calendar-create-modal" x-ignore></div>

  <!-- ===== Settings Modal ===== -->
  <div id="board-settings-modal" x-ignore></div>

  <!-- ===== Task Modal ===== -->
  <div id="board-task-modal" x-ignore></div>

  <!-- ===== Log Config Modal ===== -->
  <div id="board-log-config-modal" x-ignore></div>

</div>


<script src="/static/board.js"></script>

{% endblock %}
