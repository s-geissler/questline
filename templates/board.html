{% extends "base.html" %}

{% block nav_extra %}
<button x-data @click="$dispatch('open-board-settings')"
        class="nav-utility">
  ⚙ Settings
</button>
{% endblock %}

{% block content %}

<div
  x-data="board()"
  x-init="init()"
  x-cloak
  @open-board-settings.window="showSettings = true"
  data-board-id="{{ board.id }}"
  data-boards='{{ boards | tojson }}'
  data-board-name='{{ board.name | tojson }}'
  data-board-color='{{ (board.color or "") | tojson }}'
  data-board-role='{{ board_role | tojson }}'
>

  <div x-show="!canEditBoard" class="mx-auto max-w-5xl px-6 pt-4">
    <div class="bg-white/85 text-slate-700 text-sm rounded-xl px-4 py-3 shadow">
      Read-only access. Viewers can browse this hub but cannot change objectives, stages, or settings.
    </div>
  </div>

  <div class="fixed top-16 right-4 z-30 flex flex-col items-end gap-2">
    <button
      type="button"
      @click="setBoardView(nextBoardView)"
      class="view-toggle-shell flex items-center gap-3 rounded-2xl border px-3 py-2 shadow-lg backdrop-blur-sm transition-colors"
      :aria-pressed="boardView === 'calendar'"
      :title="boardViewToggleTitle"
    >
      <span
        class="text-xs font-semibold uppercase tracking-[0.18em] transition-colors"
        :class="stagesLabelClass"
      >Stages</span>
      <span
        class="relative inline-flex h-7 w-14 items-center rounded-full transition-colors"
        :class="boardViewTrackClass"
      >
        <span
          class="view-toggle-knob inline-block h-5 w-5 transform rounded-full shadow-sm transition-transform duration-200"
          :class="boardViewKnobClass"
        ></span>
      </span>
      <span
        class="text-xs font-semibold uppercase tracking-[0.18em] transition-colors"
        :class="calendarLabelClass"
      >Calendar</span>
    </button>
  </div>

  <div x-show="isCalendarView" class="fixed top-16 left-1/2 -translate-x-1/2 z-20">
    <div class="flex items-center gap-2 rounded-2xl bg-white/80 px-2 py-2 shadow-lg backdrop-blur-sm">
      <button
        type="button"
        @click="changeCalendarMonth(-1)"
        class="px-3 py-2 rounded-xl bg-white/85 text-slate-600 hover:bg-white shadow-sm transition-colors"
        aria-label="Previous month"
      >←</button>
      <div class="px-4 py-2 rounded-xl bg-white/90 text-sm font-semibold text-slate-700 shadow-sm min-w-[12rem] text-center" x-text="calendarMonthLabel"></div>
      <button
        type="button"
        @click="changeCalendarMonth(1)"
        class="px-3 py-2 rounded-xl bg-white/85 text-slate-600 hover:bg-white shadow-sm transition-colors"
        aria-label="Next month"
      >→</button>
      <button
        type="button"
        @click="jumpCalendarToToday()"
        class="px-3 py-2 rounded-xl bg-white/85 text-sm text-slate-600 hover:bg-white shadow-sm transition-colors"
      >Today</button>
    </div>
  </div>

  <!-- Board -->
  <div x-show="isStagesView" class="p-4 overflow-auto h-[calc(100vh-4rem)]">
    <div id="stages-container" class="min-w-max space-y-4">
      <div class="flex items-start gap-3" data-stage-top-row>
        <template x-for="stage in topRowStages" :key="`${stage.id}-${stage.row}-${stage.position}`">
          <div
            class="board-stage rounded-xl shadow w-72 flex-shrink-0 flex flex-col overflow-visible"
            :class="stageContainerClass(stage)"
            :data-stage-column-id="stageColumnId(stage)"
          >
            <div
              class="flex items-center justify-between px-3 pt-3 pb-2 border-b"
              data-stage-drag-handle
              :class="stageHeaderClass(stage)"
            >
              <div class="min-w-0 flex-1">
                <input
                  x-model="stage.name"
                  @blur="saveStageName(stage)"
                  @keydown.enter="$el.blur()"
                  :disabled="!canEditBoard"
                  class="stage-title-input font-medium bg-transparent w-full rounded px-1 py-0.5 focus:outline-none focus:ring-1 focus:ring-blue-400 text-sm"
                  :class="stageTitleInputClass(stage)"
                >
                <div x-show="stage.is_log" class="mt-1 px-1 space-y-1">
                  <div class="flex items-center gap-1.5 flex-wrap">
                    <span class="log-stage-badge text-[10px] uppercase tracking-wide px-1.5 py-0.5 rounded-full font-semibold">Filter Log</span>
                    <span class="log-stage-summary text-[10px] font-medium">⌕ Read-only view</span>
                  </div>
                  <div class="log-stage-summary text-[11px] leading-snug" x-text="logStageSummary(stage)"></div>
                </div>
              </div>
              <div x-show="canEditBoard" @click.outside="closeStageMenu()" class="relative ml-2 flex-shrink-0">
                <button
                  @click="toggleStageMenu(stage.id)"
                  class="text-gray-400 hover:text-gray-700 px-2 py-1 rounded hover:bg-white transition-colors text-lg leading-none"
                  title="Stage actions"
                >☰</button>
                <div
                  x-show="isStageMenuOpen(stage.id)"
                  x-cloak
                  x-transition:enter="transition ease-out duration-100"
                  x-transition:enter-start="opacity-0 scale-95"
                  x-transition:enter-end="opacity-100 scale-100"
                  x-transition:leave="transition ease-in duration-75"
                  x-transition:leave-start="opacity-100 scale-100"
                  x-transition:leave-end="opacity-0 scale-95"
                  class="absolute top-full right-0 mt-1 bg-white text-gray-800 shadow-xl rounded-xl py-1 min-w-[170px] z-20"
                >
                  <button
                    @click="openLogConfig(stage); closeStageMenu()"
                    class="block w-full text-left text-xs text-gray-600 hover:text-sky-600 px-3 py-2 hover:bg-gray-100 transition-colors"
                  >Configure log</button>
                  <button
                    @click="sortStageByDueDate(stage); closeStageMenu()"
                    class="block w-full text-left text-xs text-gray-600 hover:text-blue-600 px-3 py-2 hover:bg-gray-100 transition-colors"
                    title="Sort dated objectives by due date"
                    x-show="canSortStage(stage)"
                  >Sort by due date</button>
                  <button
                    @click="clearCompletedStage(stage); closeStageMenu()"
                    class="block w-full text-left text-xs text-gray-600 hover:text-amber-600 px-3 py-2 hover:bg-gray-100 transition-colors"
                    title="Clear completed objectives"
                    x-show="canClearCompletedStage(stage)"
                  >Clear completed</button>
                  <button
                    @click="deleteStage(stage.id); closeStageMenu()"
                    class="block w-full text-left text-xs text-gray-600 hover:text-red-600 px-3 py-2 hover:bg-gray-100 transition-colors"
                    title="Delete stage"
                  >Delete stage</button>
                </div>
              </div>
            </div>

            <div
              class="board-stage-body px-2 pb-1 space-y-2 min-h-[8px]"
              :class="stageBodyClass(stage)"
              :id="stageDomId(stage)"
              :data-stage-id="stage.id"
            >
              <template x-for="task in stageTasks(stage)" :key="`${task.id}-${task.position}`">
                <div
                  class="board-task-card bg-white rounded-lg p-2.5 shadow-sm cursor-pointer hover:shadow-md transition-shadow"
                  :class="`${taskCardOpacityClass(task)} ${taskCardClass(task)}`"
                  @click="openTask(task)"
                  :data-task-id="task.id"
                >
                  <div class="group/title flex items-start gap-0">
                    <button
                      x-show="canEditBoard"
                      @click.stop="toggleTaskDoneFromCard(task)"
                      class="mt-0.5 h-4 overflow-hidden rounded border flex items-center justify-center flex-shrink-0 transition-all duration-150 group-hover/title:w-4 group-hover/title:mr-2 group-hover/title:opacity-100 group-focus-within/title:w-4 group-focus-within/title:mr-2 group-focus-within/title:opacity-100"
                      :class="taskDoneToggleClass(task)"
                      :title="taskDoneToggleTitle(task)"
                    >
                      <span class="text-[11px] leading-none">✓</span>
                    </button>
                    <div class="min-w-0 flex-1">
                      <div class="flex items-start gap-1.5">
                        <span
                          class="text-sm text-gray-800 leading-snug block min-w-0 flex-1"
                          :class="taskTitleClass(task)"
                          x-text="task.title"
                        ></span>
                        <span
                          x-show="hasDescription(task)"
                          class="mt-0.5 flex-shrink-0 text-[11px] text-gray-400"
                          title="Has description"
                          aria-label="Has description"
                        >≡</span>
                      </div>
                    </div>
                  </div>
                  <div class="flex items-center gap-1.5 mt-1.5 flex-wrap">
                    <template x-if="task.task_type">
                      <span
                        class="text-xs px-2 py-0.5 rounded font-medium"
                        :class="taskTypeBadgeClass(task.task_type)"
                        x-text="task.task_type.name"
                      ></span>
                    </template>
                    <template x-if="task.parent_task">
                      <span
                        class="text-xs px-2 py-0.5 rounded font-medium bg-violet-100 text-violet-700"
                        x-text="task.parent_task.title"
                      ></span>
                    </template>
                    <template x-if="task.assignee">
                      <span
                        class="text-xs px-2 py-0.5 rounded font-medium bg-slate-100 text-slate-700"
                        x-text="assigneeChipLabel(task)"
                      ></span>
                    </template>
                    <template x-if="task.recurrence">
                      <span
                        class="text-xs px-2 py-0.5 rounded font-medium bg-blue-100 text-blue-700"
                      >↻ Recurring</span>
                    </template>
                    <template x-if="hasDueDate(task.due_date)">
                      <span
                        class="text-xs px-2 py-0.5 rounded font-medium"
                        :class="dueDateClass(task.due_date)"
                        x-text="dueDateLabel(task.due_date)"
                      ></span>
                    </template>
                    <span
                      x-show="task.checklist && task.checklist.length > 0"
                      class="text-xs text-gray-400 flex items-center gap-0.5"
                    >
                      <span>☑</span>
                      <span x-text="checklistProgress(task)"></span>
                    </span>
                    <template x-if="showLogSourceBadge(stage)">
                      <span
                        class="text-xs px-2 py-0.5 rounded font-medium bg-slate-100 text-slate-600"
                        x-text="logSourceLabel(task)"
                      ></span>
                    </template>
                  </div>
                  <template x-if="shouldShowDescriptionOnCard(task)">
                    <div
                      class="mt-1.5 text-xs text-gray-500 leading-snug prose prose-sm max-w-none"
                      x-markdown="task.description"
                    ></div>
                  </template>
                  <template x-if="shouldShowChecklistOnCard(task)">
                    <div class="mt-2 space-y-1">
                      <template x-for="item in task.checklist" :key="item.id">
                        <div class="flex items-start gap-1.5 text-xs text-gray-500">
                          <span class="mt-0.5 flex-shrink-0" :class="checklistItemIconClass(item)" x-text="checklistItemIcon(item)"></span>
                          <span class="leading-snug" :class="checklistItemTitleClass(item)" x-text="item.title"></span>
                        </div>
                      </template>
                    </div>
                  </template>
                  <template x-if="shouldShowTaskCardCustomFields(task)">
                    <div class="task-chip-row mt-1.5 pt-1.5 border-t border-gray-200/70">
                      <template x-for="field in taskCardCustomFields(task)" :key="field.id">
                        <span
                          class="text-xs px-2 py-0.5 rounded font-medium"
                          :class="taskChipClass(field, taskCardCustomFieldValue(task, field))"
                          x-text="taskCardCustomFieldLabel(task, field)"
                        ></span>
                      </template>
                    </div>
                  </template>
                </div>
              </template>
              <div class="hidden" aria-hidden="true" data-stage-sortable-sentinel><span></span></div>
            </div>

            <div class="px-2 pb-2 pt-1" x-show="canShowNewTaskButton(stage)">
              <div x-show="!isNewTaskFormVisible(stage)">
                <button
                  @click="openNewTaskForm(stage.id)"
                  class="text-gray-500 hover:text-gray-800 text-sm w-full text-left px-1 py-1 rounded hover:bg-gray-200 transition-colors"
                >+ Add an objective</button>
              </div>
              <div x-show="isNewTaskFormOpen(stage.id)">
                <input
                  :id="newTaskInputId(stage)"
                  :value="newTaskTitles[stage.id] || ''"
                  @input="updateNewTaskTitle(stage.id, $event.target.value)"
                  @keydown.enter="createTask(stage.id)"
                  @keydown.escape="closeNewTaskForm(stage.id)"
                  placeholder="Objective title..."
                  class="w-full border rounded-lg px-2 py-1.5 text-sm mb-1.5 focus:outline-none focus:ring-2 focus:ring-blue-400"
                >
                <div class="flex gap-1.5">
                  <button
                    @click="createTask(stage.id)"
                    class="bg-blue-500 hover:bg-blue-600 text-white text-sm px-3 py-1 rounded-lg transition-colors"
                  >Add</button>
                  <button
                    @click="closeNewTaskForm(stage.id)"
                    class="text-gray-500 hover:text-gray-700 text-sm px-2 py-1"
                  >✕</button>
                </div>
              </div>
            </div>
          </div>
        </template>

        <div class="w-72 flex-shrink-0 group/add-top" x-show="canEditBoard">
          <div class="min-h-[48px] rounded-xl">
          <div x-show="!showNewStage || newStageRow !== 0">
              <button
                @click="openNewStageForm(0)"
                class="w-full rounded-xl border border-dashed border-white/30 bg-white/10 px-3 py-3 text-left text-sm font-medium text-white/80 opacity-0 transition-all duration-150 hover:bg-white/15 group-hover/add-top:opacity-100 group-focus-within/add-top:opacity-100"
                :class="showStageDropTargetsClass"
            >+ Add stage here</button>
          </div>
          <div x-show="showNewStage && newStageRow === 0" class="bg-gray-100 rounded-xl p-3 shadow">
            <input
              x-ref="newStageInput"
              x-model="newStageName"
              @keydown.enter="createStage(0)"
              @keydown.escape="cancelNewStage()"
              placeholder="Stage title..."
              class="w-full border rounded-lg px-2 py-1.5 text-sm mb-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
            >
            <div class="flex gap-1.5">
              <button
                @click="createStage(0)"
                class="bg-blue-500 hover:bg-blue-600 text-white text-sm px-3 py-1 rounded-lg transition-colors"
              >Add stage</button>
              <button
                @click="cancelNewStage()"
                class="text-gray-600 hover:text-gray-800 text-sm px-2 py-1"
              >✕</button>
            </div>
          </div>
          </div>
        </div>
      </div>

      <div class="flex items-start gap-3">
        <template x-for="slot in secondRowSlots" :key="`second-row-slot-${slot.position}`">
          <div class="w-72 flex-shrink-0 group/add-bottom" :data-stage-slot-position="slot.position">
            <div
              class="min-h-[48px] rounded-xl"
              data-stage-row="1"
            >
              <template x-if="slot.stage">
                <div
                  class="board-stage rounded-xl shadow w-72 flex-shrink-0 flex flex-col overflow-visible"
                  :class="stageContainerClass(slot.stage)"
                  :data-stage-column-id="stageColumnId(slot.stage)"
                >
                    <div
                      class="flex items-center justify-between px-3 pt-3 pb-2 border-b"
                      data-stage-drag-handle
                      :class="stageHeaderClass(slot.stage)"
                    >
                      <div class="min-w-0 flex-1">
                        <input
                          x-model="slot.stage.name"
                          @blur="saveStageName(slot.stage)"
                          @keydown.enter="$el.blur()"
                          :disabled="!canEditBoard"
                          class="stage-title-input font-medium bg-transparent w-full rounded px-1 py-0.5 focus:outline-none focus:ring-1 focus:ring-blue-400 text-sm"
                          :class="stageTitleInputClass(slot.stage)"
                        >
                        <div x-show="slot.stage && slot.stage.is_log" class="mt-1 px-1 space-y-1">
                          <div class="flex items-center gap-1.5 flex-wrap">
                            <span class="log-stage-badge text-[10px] uppercase tracking-wide px-1.5 py-0.5 rounded-full font-semibold">Filter Log</span>
                            <span class="log-stage-summary text-[10px] font-medium">⌕ Read-only view</span>
                          </div>
                          <div class="log-stage-summary text-[11px] leading-snug" x-text="logStageSummary(slot.stage)"></div>
                        </div>
                      </div>
                      <div x-show="canEditBoard" @click.outside="closeStageMenu()" class="relative ml-2 flex-shrink-0">
                        <button
                          @click="toggleStageMenu(slot.stage.id)"
                          class="text-gray-400 hover:text-gray-700 px-2 py-1 rounded hover:bg-white transition-colors text-lg leading-none"
                          title="Stage actions"
                        >☰</button>
                        <div
                          x-show="isStageMenuOpen(slot.stage.id)"
                          x-cloak
                          x-transition:enter="transition ease-out duration-100"
                          x-transition:enter-start="opacity-0 scale-95"
                          x-transition:enter-end="opacity-100 scale-100"
                          x-transition:leave="transition ease-in duration-75"
                          x-transition:leave-start="opacity-100 scale-100"
                          x-transition:leave-end="opacity-0 scale-95"
                          class="absolute top-full right-0 mt-1 bg-white text-gray-800 shadow-xl rounded-xl py-1 min-w-[170px] z-20"
                        >
                          <button
                            @click="openLogConfig(slot.stage); closeStageMenu()"
                            class="block w-full text-left text-xs text-gray-600 hover:text-sky-600 px-3 py-2 hover:bg-gray-100 transition-colors"
                          >Configure log</button>
                          <button
                            @click="sortStageByDueDate(slot.stage); closeStageMenu()"
                            class="block w-full text-left text-xs text-gray-600 hover:text-blue-600 px-3 py-2 hover:bg-gray-100 transition-colors"
                            title="Sort dated objectives by due date"
                            x-show="canSortStage(slot.stage)"
                          >Sort by due date</button>
                          <button
                            @click="clearCompletedStage(slot.stage); closeStageMenu()"
                            class="block w-full text-left text-xs text-gray-600 hover:text-amber-600 px-3 py-2 hover:bg-gray-100 transition-colors"
                            title="Clear completed objectives"
                            x-show="canClearCompletedStage(slot.stage)"
                          >Clear completed</button>
                          <button
                            @click="deleteStage(slot.stage.id); closeStageMenu()"
                            class="block w-full text-left text-xs text-gray-600 hover:text-red-600 px-3 py-2 hover:bg-gray-100 transition-colors"
                            title="Delete stage"
                          >Delete stage</button>
                        </div>
                      </div>
                    </div>

                    <div
                      class="board-stage-body px-2 pb-1 space-y-2 min-h-[8px]"
                      :class="stageBodyClass(slot.stage)"
                      :id="stageDomId(slot.stage)"
                      :data-stage-id="stageColumnId(slot.stage)"
                    >
                      <template x-for="task in stageTasks(slot.stage)" :key="`${task.id}-${task.position}`">
                        <div
                          class="board-task-card bg-white rounded-lg p-2.5 shadow-sm cursor-pointer hover:shadow-md transition-shadow"
                          :class="`${taskCardOpacityClass(task)} ${taskCardClass(task)}`"
                          @click="openTask(task)"
                          :data-task-id="task.id"
                        >
                          <div class="group/title flex items-start gap-0">
                            <button
                              x-show="canEditBoard"
                              @click.stop="toggleTaskDoneFromCard(task)"
                              class="mt-0.5 h-4 overflow-hidden rounded border flex items-center justify-center flex-shrink-0 transition-all duration-150 group-hover/title:w-4 group-hover/title:mr-2 group-hover/title:opacity-100 group-focus-within/title:w-4 group-focus-within/title:mr-2 group-focus-within/title:opacity-100"
                              :class="taskDoneToggleClass(task)"
                              :title="taskDoneToggleTitle(task)"
                            >
                              <span class="text-[11px] leading-none">✓</span>
                            </button>
                            <div class="min-w-0 flex-1">
                              <div class="flex items-start gap-1.5">
                                <span
                                  class="text-sm text-gray-800 leading-snug block min-w-0 flex-1"
                                  :class="taskTitleClass(task)"
                                  x-text="task.title"
                                ></span>
                                <span
                                  x-show="hasDescription(task)"
                                  class="mt-0.5 flex-shrink-0 text-[11px] text-gray-400"
                                  title="Has description"
                                  aria-label="Has description"
                                >≡</span>
                              </div>
                            </div>
                          </div>
                          <div class="flex items-center gap-1.5 mt-1.5 flex-wrap">
                            <template x-if="task.task_type">
                              <span
                                class="text-xs px-2 py-0.5 rounded font-medium"
                                :class="taskTypeBadgeClass(task.task_type)"
                                x-text="task.task_type.name"
                              ></span>
                            </template>
                            <template x-if="task.parent_task">
                              <span
                                class="text-xs px-2 py-0.5 rounded font-medium bg-violet-100 text-violet-700"
                                x-text="task.parent_task.title"
                              ></span>
                            </template>
                            <template x-if="task.assignee">
                              <span
                                class="text-xs px-2 py-0.5 rounded font-medium bg-slate-100 text-slate-700"
                                x-text="assigneeChipLabel(task)"
                              ></span>
                            </template>
                            <template x-if="task.recurrence">
                              <span
                                class="text-xs px-2 py-0.5 rounded font-medium bg-blue-100 text-blue-700"
                              >↻ Recurring</span>
                            </template>
                            <template x-if="hasDueDate(task.due_date)">
                              <span
                                class="text-xs px-2 py-0.5 rounded font-medium"
                                :class="dueDateClass(task.due_date)"
                                x-text="dueDateLabel(task.due_date)"
                              ></span>
                            </template>
                            <span
                              x-show="task.checklist && task.checklist.length > 0"
                              class="text-xs text-gray-400 flex items-center gap-0.5"
                            >
                              <span>☑</span>
                              <span x-text="checklistProgress(task)"></span>
                            </span>
                            <template x-if="showLogSourceBadge(slot.stage)">
                              <span
                                class="text-xs px-2 py-0.5 rounded font-medium bg-slate-100 text-slate-600"
                                x-text="logSourceLabel(task)"
                              ></span>
                            </template>
                          </div>
                          <template x-if="shouldShowDescriptionOnCard(task)">
                            <div
                              class="mt-1.5 text-xs text-gray-500 leading-snug prose prose-sm max-w-none"
                              x-markdown="task.description"
                            ></div>
                          </template>
                          <template x-if="shouldShowChecklistOnCard(task)">
                            <div class="mt-2 space-y-1">
                              <template x-for="item in task.checklist" :key="item.id">
                                <div class="flex items-start gap-1.5 text-xs text-gray-500">
                                  <span class="mt-0.5 flex-shrink-0" :class="checklistItemIconClass(item)" x-text="checklistItemIcon(item)"></span>
                                  <span class="leading-snug" :class="checklistItemTitleClass(item)" x-text="item.title"></span>
                                </div>
                              </template>
                            </div>
                          </template>
                          <template x-if="shouldShowTaskCardCustomFields(task)">
                            <div class="task-chip-row mt-1.5 pt-1.5 border-t border-gray-200/70">
                              <template x-for="field in taskCardCustomFields(task)" :key="field.id">
                                <span
                                  class="text-xs px-2 py-0.5 rounded font-medium"
                                  :class="taskChipClass(field, taskCardCustomFieldValue(task, field))"
                                  x-text="taskCardCustomFieldLabel(task, field)"
                                ></span>
                              </template>
                            </div>
                          </template>
                        </div>
                      </template>
                      <div class="hidden" aria-hidden="true" data-stage-sortable-sentinel><span></span></div>
                    </div>

                    <div class="px-2 pb-2 pt-1" x-show="canShowNewTaskButton(slot.stage)">
                      <div x-show="slot.stage && !isNewTaskFormVisible(slot.stage)">
                        <button
                          @click="openNewTaskForm(slot.stage.id)"
                          class="text-gray-500 hover:text-gray-800 text-sm w-full text-left px-1 py-1 rounded hover:bg-gray-200 transition-colors"
                        >+ Add an objective</button>
                      </div>
                      <div x-show="slot.stage && isNewTaskFormOpen(slot.stage.id)">
                        <input
                          :id="newTaskInputId(slot.stage)"
                          :value="newTaskTitles[slot.stage.id] || ''"
                          @input="updateNewTaskTitle(slot.stage.id, $event.target.value)"
                          @keydown.enter="createTask(slot.stage.id)"
                          @keydown.escape="closeNewTaskForm(slot.stage.id)"
                          placeholder="Objective title..."
                          class="w-full border rounded-lg px-2 py-1.5 text-sm mb-1.5 focus:outline-none focus:ring-2 focus:ring-blue-400"
                        >
                        <div class="flex gap-1.5">
                          <button
                            @click="createTask(slot.stage.id)"
                            class="bg-blue-500 hover:bg-blue-600 text-white text-sm px-3 py-1 rounded-lg transition-colors"
                          >Add</button>
                          <button
                            @click="closeNewTaskForm(slot.stage.id)"
                            class="text-gray-500 hover:text-gray-700 text-sm px-2 py-1"
                          >✕</button>
                        </div>
                      </div>
                    </div>
                </div>
              </template>

              <button
                x-show="!slot.stage && canEditBoard && (!showNewStage || newStageRow !== 1 || newStagePosition !== slot.position)"
                @click="openNewStageForm(1, slot.position)"
                class="w-full rounded-xl border border-dashed border-white/30 bg-white/10 px-3 py-3 text-left text-sm font-medium text-white/80 opacity-0 transition-all duration-150 hover:bg-white/15 group-hover/add-bottom:opacity-100 group-focus-within/add-bottom:opacity-100"
                :class="showStageDropTargetsClass"
              >+ Add stage here</button>
              <div
                x-show="!slot.stage && showNewStage && newStageRow === 1 && newStagePosition === slot.position"
                class="bg-gray-100 rounded-xl p-3 shadow"
              >
                <input
                  x-ref="newStageInput"
                  x-model="newStageName"
                  @keydown.enter="createStage(1, slot.position)"
                  @keydown.escape="cancelNewStage()"
                  placeholder="Stage title..."
                  class="w-full border rounded-lg px-2 py-1.5 text-sm mb-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
                >
                <div class="flex gap-1.5">
                  <button
                    @click="createStage(1, slot.position)"
                    class="bg-blue-500 hover:bg-blue-600 text-white text-sm px-3 py-1 rounded-lg transition-colors"
                  >Add stage</button>
                  <button
                    @click="cancelNewStage()"
                    class="text-gray-600 hover:text-gray-800 text-sm px-2 py-1"
                  >✕</button>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <div x-show="isCalendarView" class="p-4 pt-24">
    <div class="mx-auto max-w-7xl rounded-2xl bg-white/85 shadow-lg overflow-hidden">
      <div class="calendar-header-strip grid grid-cols-7 border-b">
        <template x-for="weekday in calendarWeekdayLabels" :key="weekday">
          <div class="px-3 py-2 text-xs font-semibold uppercase tracking-wide calendar-weekday-label" x-text="weekday"></div>
        </template>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-7">
        <template x-for="day in calendarDays" :key="day.date">
          <div
            class="min-h-[11rem] border-b border-r border-slate-200 p-2.5 flex flex-col gap-2"
            :class="calendarDayClass(day)"
            :data-calendar-date="day.date"
            @dblclick="openCalendarCreate(day, $event)"
          >
            <div class="flex items-center justify-between gap-2">
              <span
                class="inline-flex items-center justify-center h-8 min-w-8 px-2 rounded-full text-sm font-semibold"
                :class="calendarDayNumberClass(day)"
                x-text="day.dayNumber"
              ></span>
              <span x-show="day.entries.length" class="text-[11px] font-medium calendar-day-count" x-text="calendarDayCountLabel(day.entries)"></span>
            </div>

            <div class="space-y-2 flex-1 min-h-[6rem]" data-calendar-dropzone="true">
              <template x-for="entry in day.entries" :key="entry.key">
                <div
                  @click="openTask(entry)"
                  @keydown.enter.prevent="openTask(entry)"
                  @keydown.space.prevent="openTask(entry)"
                  data-calendar-task="true"
                  :data-task-id="calendarTaskId(entry)"
                  :data-calendar-draggable="calendarEntryDraggableValue(entry)"
                  role="button"
                  tabindex="0"
                  class="w-full rounded-lg px-2.5 py-2 bg-white shadow-sm hover:shadow-md transition-all cursor-pointer"
                  :class="`${calendarTaskCardClass(entry, day.date)} ${taskCardClass(entry)}`"
                >
                  <div class="flex items-start justify-between gap-2">
                    <span class="text-sm font-medium leading-snug" :class="calendarEntryTitleClass(entry)" x-text="entry.title"></span>
                    <span x-show="entry.recurrence" class="text-[10px] font-semibold uppercase tracking-wide opacity-70">↻</span>
                  </div>
                  <div class="mt-1.5 flex items-center gap-1.5 flex-wrap">
                    <template x-if="entry.task_type">
                      <span
                        class="text-[11px] px-1.5 py-0.5 rounded font-medium"
                        :class="taskTypeBadgeClass(entry.task_type)"
                        x-text="entry.task_type.name"
                      ></span>
                    </template>
                    <span
                      class="text-[11px] px-1.5 py-0.5 rounded font-medium bg-slate-100 text-slate-600"
                      x-text="calendarStageLabel(entry)"
                    ></span>
                    <span x-show="entry.is_calendar_preview" class="text-[11px] text-blue-600 font-medium">Next occurrence</span>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <div
    x-show="showCalendarCreate"
    x-transition:enter="transition ease-out duration-150"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-100"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4"
    @click.self="closeCalendarCreate()"
    @keydown.escape.window="if (showCalendarCreate) closeCalendarCreate()"
  >
    <div
      x-transition:enter="transition ease-out duration-150"
      x-transition:enter-start="opacity-0 scale-95"
      x-transition:enter-end="opacity-100 scale-100"
      class="bg-white rounded-2xl shadow-2xl w-full max-w-md"
      @click.stop
    >
      <div class="p-6">
        <div class="flex items-center justify-between mb-5">
          <div>
            <h2 class="text-lg font-bold text-gray-800">New Objective</h2>
            <p class="text-sm text-gray-400 mt-1">Create for <span x-text="formatCalendarCreateDate(calendarCreateDate)"></span></p>
          </div>
          <button @click="closeCalendarCreate()" class="text-gray-400 hover:text-gray-600 text-xl leading-none">×</button>
        </div>

        <div class="mb-6">
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Stage</label>
          <select
            x-model="calendarCreateStageId"
            class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
          >
            <template x-for="stage in realStages" :key="`calendar-create-stage-${stage.id}`">
              <option :value="asString(stage.id)" x-text="stage.name"></option>
            </template>
          </select>
        </div>

        <div class="flex justify-end gap-2 border-t pt-4">
          <button @click="closeCalendarCreate()" class="text-gray-500 hover:text-gray-700 px-4 py-2 text-sm">Cancel</button>
          <button
            @click="createTaskFromCalendar()"
            class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors"
          >Continue</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Settings Modal ===== -->
  <div
    x-show="showSettings"
    x-transition:enter="transition ease-out duration-150"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-100"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4"
    @click.self="showSettings = false"
    @keydown.escape.window="if (showSettings) showSettings = false"
  >
    <div
      x-transition:enter="transition ease-out duration-150"
      x-transition:enter-start="opacity-0 scale-95"
      x-transition:enter-end="opacity-100 scale-100"
      class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto"
      @click.stop
    >
      <div class="p-6">
        <div class="flex items-center justify-between mb-5">
          <h2 class="text-lg font-bold text-gray-800">Hub Settings</h2>
          <button @click="showSettings = false" class="text-gray-400 hover:text-gray-600 text-xl leading-none">×</button>
        </div>

        <!-- Board name -->
        <div class="mb-5">
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Hub Name</label>
          <input
            x-model="settingsBoardName"
            @keydown.enter="saveSettings()"
            :disabled="!canManageBoard"
            class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
          >
        </div>

        <!-- Board color -->
        <div class="mb-6">
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Hub Color</label>
          <div class="flex flex-wrap gap-2 mb-3">
            <template x-for="c in PRESET_COLORS" :key="c">
              <button
                @click="settingsBoardColor = c"
                :disabled="!canManageBoard"
                class="w-8 h-8 rounded-full hover:scale-110 transition-transform border-2 border-black/10"
                :class="settingsColorSwatchClass(c)"
              ></button>
            </template>
            <button
              @click="settingsBoardColor = null"
              :disabled="!canManageBoard"
              class="w-8 h-8 rounded-full bg-gray-100 border-2 border-dashed border-gray-300 flex items-center justify-center text-gray-400 hover:bg-gray-200 transition-colors"
              :class="emptyColorSettingsClass(settingsBoardColor)"
              title="No color"
            >✕</button>
          </div>
          <div class="h-6 rounded-lg transition-colors" :class="settingsBoardColorStyle"></div>
        </div>

        <div x-show="canManageBoard" class="mb-6 border-t pt-5">
          <div class="flex items-center justify-between mb-3">
            <div>
              <h3 class="text-sm font-semibold text-gray-800">Sharing</h3>
              <p class="text-xs text-gray-400 mt-0.5">Share this hub with other registered users.</p>
            </div>
          </div>

          <div class="flex gap-2 mb-4">
            <input
              x-model="shareEmail"
              @keydown.enter="addBoardMember()"
              placeholder="user@example.com"
              class="flex-1 border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
            >
            <select
              x-model="shareRole"
              class="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
            >
              <option value="viewer">Viewer</option>
              <option value="editor">Editor</option>
              <option value="owner">Owner</option>
            </select>
            <button
              @click="addBoardMember()"
              class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors"
            >Share</button>
          </div>

          <p x-show="shareError" x-text="shareError" class="text-sm text-red-500 mb-3"></p>

          <div class="space-y-2">
            <template x-for="member in boardMembers" :key="member.user_id">
              <div class="flex items-center gap-3 border rounded-xl px-3 py-2">
                <div class="min-w-0 flex-1">
                  <div class="text-sm font-medium text-gray-800" x-text="member.display_name"></div>
                  <div class="text-xs text-gray-400" x-text="member.email"></div>
                </div>
                <select
                  :value="member.role"
                  @change="updateBoardMemberRole(member, $event.target.value)"
                  class="border rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                >
                  <option value="viewer">Viewer</option>
                  <option value="editor">Editor</option>
                  <option value="owner">Owner</option>
                </select>
                <button
                  @click="removeBoardMember(member)"
                  class="text-sm text-red-400 hover:text-red-600 transition-colors"
                >Remove</button>
              </div>
            </template>
          </div>
        </div>

        <div class="flex justify-end gap-2 border-t pt-4">
          <button @click="showSettings = false" class="text-gray-500 hover:text-gray-700 px-4 py-2 text-sm">Cancel</button>
          <button
            @click="saveSettings()"
            x-show="canManageBoard"
            class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors"
          >Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Task Modal ===== -->
  <div
    x-show="showModal"
    x-transition:enter="transition ease-out duration-150"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-100"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4"
    @click.self="closeModal()"
    @keydown.escape.window="closeModal()"
  >
      <template x-if="showModal && selectedTask">
        <div
          x-transition:enter="transition ease-out duration-150"
          x-transition:enter-start="opacity-0 scale-95"
          x-transition:enter-end="opacity-100 scale-100"
          class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto"
          @click.stop
        >
        <div class="p-6">

          <!-- Title row -->
          <div class="flex items-start gap-3 mb-5">
            <div class="flex-1">
              <input
                x-model="selectedTask.title"
                @blur="updateTaskField('title', selectedTask.title)"
                @keydown.enter="$el.blur()"
                :disabled="!canEditBoard"
                class="text-xl font-bold w-full border-b-2 border-transparent hover:border-gray-200 focus:border-blue-400 focus:outline-none py-0.5 transition-colors"
              >
            </div>
            <button
              x-show="canEditBoard"
              @click="toggleDone()"
              class="flex-shrink-0 px-3 py-1.5 rounded-lg text-sm font-medium transition-colors"
              :class="selectedTaskDoneButtonClass"
              x-text="selectedTaskDoneLabel"
            ></button>
            <div x-show="canEditBoard" @click.outside="closeTaskActionMenu()" class="relative flex-shrink-0">
              <button
                @click="toggleTaskActionMenu()"
                class="px-3 py-1.5 rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm font-medium transition-colors"
                title="Objective actions"
              >☰</button>
              <div
                x-show="taskActionMenuOpen"
                x-cloak
                x-transition:enter="transition ease-out duration-100"
                x-transition:enter-start="opacity-0 scale-95"
                x-transition:enter-end="opacity-100 scale-100"
                x-transition:leave="transition ease-in duration-75"
                x-transition:leave-start="opacity-100 scale-100"
                x-transition:leave-end="opacity-0 scale-95"
                class="absolute top-full right-0 mt-1 bg-white text-gray-800 shadow-xl rounded-xl p-3 min-w-[260px] z-30 space-y-3"
              >
                <div>
                  <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Objective Type</label>
                  <select
                    x-model="selectedTask.task_type_id"
                    @change="updateTaskType(); closeTaskActionMenu()"
                    class="w-full border rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                  >
                    <option value="" :selected="isDefaultTaskTypeSelected">Objective (default)</option>
                    <template x-for="tt in taskTypes" :key="tt.id">
                      <option
                        :value="asString(tt.id)"
                        :selected="isTaskTypeSelected(tt)"
                        x-text="taskTypeOptionLabel(tt)"
                      ></option>
                    </template>
                  </select>
                </div>
                <div>
                  <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Stage</label>
                  <select
                    x-model="selectedTask.stage_id"
                    @change="moveTask(); closeTaskActionMenu()"
                    class="w-full border rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                  >
                    <template x-for="stage in realStages" :key="stage.id">
                      <option :value="stage.id" x-text="stage.name"></option>
                    </template>
                  </select>
                </div>
                <div class="border-t pt-3">
                  <button
                    x-show="!selectedTask.recurrence"
                    @click="enableRecurrence(); closeTaskActionMenu()"
                    class="w-full text-left text-sm text-blue-600 hover:text-blue-800 transition-colors"
                  >Make this a recurring objective</button>
                  <button
                    x-show="selectedTask.recurrence"
                    @click="disableRecurrence(); closeTaskActionMenu()"
                    class="w-full text-left text-sm text-amber-600 hover:text-amber-800 transition-colors"
                  >Stop this objective from recurring</button>
                </div>
                <div class="border-t pt-3">
                  <button
                    @click="deleteTask(); closeTaskActionMenu()"
                    class="w-full text-left text-sm text-red-500 hover:text-red-700 transition-colors"
                  >Delete objective</button>
                </div>
              </div>
            </div>
            <button @click="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl leading-none flex-shrink-0">×</button>
          </div>

          <!-- Assignee + Due Date + Color row -->
          <div class="grid grid-cols-1 md:grid-cols-[1fr_1fr_auto] gap-4 mb-5 items-end">
            <div>
              <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Assignee</label>
              <select
                :key="assigneeSelectKey()"
                x-model="selectedTask.assignee_user_id"
                @change="updateAssignee()"
                :disabled="!canEditBoard"
                class="w-full border rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
              >
                <option value="" :selected="isUnassignedSelected">Unassigned</option>
                <template x-for="member in assignableMembers" :key="member.user_id">
                  <option
                    :value="asString(member.user_id)"
                    :selected="isAssigneeSelected(member)"
                    x-text="member.display_name"
                  ></option>
                </template>
              </select>
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Due Date</label>
              <input
                type="date"
                x-model="selectedTask.due_date"
                @change="updateTaskField('due_date', selectedTask.due_date || null)"
                :disabled="!canEditBoard"
                class="w-full border rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
              >
            </div>
            <div @click.outside="closeTaskColorPicker()" class="relative pb-0.5">
              <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Color</label>
              <button
                @click="toggleTaskColorPicker()"
                :disabled="!canEditBoard"
                class="w-8 h-8 rounded-full border-2 border-gray-200 hover:scale-110 transition-transform shadow-sm"
                :class="selectedTaskColorStyle()"
                title="Pick color"
              ></button>
              <div x-show="taskColorPickerOpen" x-cloak
                   class="absolute top-full right-0 mt-1 bg-white shadow-xl rounded-xl p-3 z-30 w-48">
                <div class="flex flex-wrap gap-2">
                  <template x-for="c in PRESET_COLORS" :key="c">
                    <button
                      @click="selectedTask.color = c; updateTaskField('color', c); closeTaskColorPicker()"
                      class="w-6 h-6 rounded-full hover:scale-110 transition-transform border border-black/10"
                      :class="taskColorSwatchClass(c)"
                    ></button>
                  </template>
                  <button
                    @click="selectedTask.color = null; updateTaskField('color', null); closeTaskColorPicker()"
                    class="w-6 h-6 rounded-full bg-gray-100 border border-dashed border-gray-300 flex items-center justify-center text-gray-400 text-xs hover:bg-gray-200"
                    title="No color"
                  >✕</button>
                </div>
              </div>
            </div>
          </div>

          <template x-if="selectedTask.parent_task">
            <div class="mb-5">
              <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Quest</label>
              <button
                @click="openParentTask()"
                class="w-full text-left border rounded-lg px-3 py-2 text-sm hover:bg-gray-50 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-400"
              >
                <span class="text-blue-600 font-medium" x-text="selectedTaskParentTitle"></span>
              </button>
            </div>
          </template>

          <template x-if="selectedTask.recurrence">
            <div
              class="mb-5 border rounded-xl bg-gray-50"
              :class="recurrenceContainerClass"
            >
              <div class="flex items-center justify-between gap-3" :class="recurrenceHeaderClass">
                <div>
                  <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide">Recurrence</label>
                </div>
                <div class="flex items-center gap-2">
                  <button
                    @click="recurrenceExpanded = !recurrenceExpanded"
                    class="text-sm text-gray-500 hover:text-gray-700 px-3 py-1.5"
                    x-text="recurrenceToggleLabel"
                  ></button>
                  <button
                    @click="disableRecurrence()"
                    x-show="canEditBoard"
                    class="text-sm text-amber-600 hover:text-amber-800 px-3 py-1.5"
                  >Stop repeating</button>
                </div>
              </div>

              <div x-show="recurrenceExpanded" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Behavior</label>
                  <select
                    x-model="selectedTask.recurrence.mode"
                    :disabled="!canEditBoard"
                    class="w-full border rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                  >
                    <option value="create_new">Create a new objective</option>
                    <option value="reuse_existing">Reuse this objective</option>
                  </select>
                </div>

                <div>
                  <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Frequency</label>
                  <select
                    x-model="selectedTask.recurrence.frequency"
                    :disabled="!canEditBoard"
                    class="w-full border rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                  >
                    <option value="daily">Daily</option>
                    <option value="weekly">Weekly</option>
                    <option value="monthly">Monthly</option>
                  </select>
                </div>

                <div>
                  <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Every</label>
                  <div class="flex items-center gap-2">
                    <input
                      type="number"
                      min="1"
                      step="1"
                      x-model.number="selectedTask.recurrence.interval"
                      :disabled="!canEditBoard"
                      class="w-24 border rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                    >
                    <span class="text-sm text-gray-500" x-text="recurrenceUnitLabel(selectedTask.recurrence.frequency, selectedTask.recurrence.interval)"></span>
                  </div>
                </div>

                <div>
                  <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Next Occurrence</label>
                  <input
                    type="date"
                    x-model="selectedTask.recurrence.next_run_on"
                    :disabled="!canEditBoard"
                    class="w-full border rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                  >
                </div>

                <div>
                  <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Start Stage</label>
                  <select
                    x-model="selectedTask.recurrence.spawn_stage_id"
                    :disabled="!canEditBoard"
                    class="w-full border rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                  >
                    <template x-for="stage in realStages" :key="`recurrence-stage-${stage.id}`">
                      <option :value="asString(stage.id)" x-text="stage.name"></option>
                    </template>
                  </select>
                </div>
              </div>

              <div x-show="recurrenceExpanded" class="flex justify-end gap-2 mt-4">
                <button
                  @click="saveRecurrence()"
                  x-show="canEditBoard"
                  class="bg-blue-500 hover:bg-blue-600 text-white text-sm px-3 py-1.5 rounded-lg transition-colors"
                >Save recurrence</button>
              </div>
            </div>
          </template>

          <!-- Description -->
          <div class="mb-5">
            <div class="flex items-center justify-between gap-3 mb-1">
              <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide">Description</label>
              <div class="inline-flex rounded-lg border border-gray-200 overflow-hidden flex-shrink-0">
                  <button
                    type="button"
                    @click="updateDescriptionVisibility('default')"
                    :disabled="!canEditBoard"
                    class="px-2.5 py-1 text-xs font-medium transition-colors border-r border-gray-200"
                    :class="descriptionVisibilityButtonClass('default')"
                  >Default</button>
                  <button
                    type="button"
                    @click="updateDescriptionVisibility('show')"
                    :disabled="!canEditBoard"
                    class="px-2.5 py-1 text-xs font-medium transition-colors border-r border-gray-200"
                    :class="descriptionVisibilityButtonClass('show')"
                  >Show</button>
                  <button
                    type="button"
                    @click="updateDescriptionVisibility('hide')"
                    :disabled="!canEditBoard"
                    class="px-2.5 py-1 text-xs font-medium transition-colors"
                    :class="descriptionVisibilityButtonClass('hide')"
                  >Hide</button>
              </div>
            </div>
            <!-- Rendered preview (click to edit) -->
            <div
              x-show="!descriptionEditing"
              @click="if (canEditBoard) { descriptionEditing = true; $nextTick(() => $refs.descriptionTextarea.focus()) }"
              class="min-h-[60px] cursor-text rounded-lg px-3 py-2 text-sm text-gray-700 hover:bg-gray-50 border border-transparent hover:border-gray-200 transition-colors prose prose-sm max-w-none"
            >
              <template x-if="selectedTask.description">
                <div x-markdown="selectedTask.description"></div>
              </template>
              <template x-if="!selectedTask.description">
                <span class="text-gray-400 italic">Add a description...</span>
              </template>
            </div>
            <!-- Edit textarea -->
            <textarea
              x-show="descriptionEditing"
              x-ref="descriptionTextarea"
              x-model="selectedTask.description"
              :disabled="!canEditBoard"
              @blur="descriptionEditing = false; updateTaskField('description', selectedTask.description)"
              @keydown.escape="descriptionEditing = false; updateTaskField('description', selectedTask.description)"
              rows="5"
              placeholder="Add a description... (supports Markdown)"
              class="w-full border rounded-lg px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-blue-400"
            ></textarea>
          </div>

          <!-- Custom Fields -->
          <template x-if="selectedTaskType && selectedTaskType.custom_fields && selectedTaskType.custom_fields.length > 0">
            <div class="mb-5">
              <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Custom Fields</label>
              <div class="space-y-2">
                <template x-for="field in selectedTaskType.custom_fields" :key="field.id">
                  <div class="flex items-center gap-3">
                    <label class="text-sm text-gray-600 w-1/3 flex-shrink-0" x-text="field.name"></label>
                    <template x-if="field.field_type === 'dropdown'">
                      <select
                        :value="selectedTaskCustomFieldValue(field)"
                        @change="updateCustomField(field.id, $event.target.value)"
                        :disabled="!canEditBoard"
                        class="flex-1 border rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                      >
                        <option value="">— select —</option>
                        <template x-for="opt in customFieldOptions(field)" :key="opt">
                          <option
                            :value="customFieldOptionLabel(opt)"
                            x-text="customFieldOptionLabel(opt)"
                            :selected="isCustomFieldOptionSelected(field, opt)"
                          ></option>
                        </template>
                      </select>
                    </template>
                    <template x-if="field.field_type !== 'dropdown'">
                      <input
                        :type="selectedTaskInputType(field)"
                        :value="selectedTaskCustomFieldValue(field)"
                        @change="updateCustomField(field.id, $event.target.value)"
                        :disabled="!canEditBoard"
                        :placeholder="field.name"
                        class="flex-1 border rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                      >
                    </template>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <!-- Checklist -->
          <div class="mb-5">
            <div class="flex items-center justify-between gap-3 mb-2">
              <label class="text-xs font-semibold text-gray-400 uppercase tracking-wide">
                Checklist
                <span
                  x-show="selectedTask.checklist && selectedTask.checklist.length > 0"
                  class="ml-1 normal-case font-normal text-gray-400"
                  x-text="selectedTaskChecklistSummary"
                ></span>
              </label>
              <div class="flex items-center gap-2 flex-wrap justify-end">
                <span
                  x-show="selectedTaskType && selectedTaskType.is_epic"
                  class="text-xs bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full font-medium"
                >⚡ Items spawn objectives</span>
                <div class="inline-flex rounded-lg border border-gray-200 overflow-hidden flex-shrink-0">
                  <button
                    type="button"
                    @click="updateChecklistVisibility('default')"
                    :disabled="!canEditBoard"
                    class="px-2.5 py-1 text-xs font-medium transition-colors border-r border-gray-200"
                    :class="checklistVisibilityButtonClass('default')"
                  >Default</button>
                  <button
                    type="button"
                    @click="updateChecklistVisibility('show')"
                    :disabled="!canEditBoard"
                    class="px-2.5 py-1 text-xs font-medium transition-colors border-r border-gray-200"
                    :class="checklistVisibilityButtonClass('show')"
                  >Show</button>
                  <button
                    type="button"
                    @click="updateChecklistVisibility('hide')"
                    :disabled="!canEditBoard"
                    class="px-2.5 py-1 text-xs font-medium transition-colors"
                    :class="checklistVisibilityButtonClass('hide')"
                  >Hide</button>
                </div>
              </div>
            </div>

            <!-- Checklist progress bar -->
            <template x-if="selectedTask.checklist && selectedTask.checklist.length > 0">
              <progress
                class="checklist-progress mb-2"
                max="100"
                value="0"
                :value="checklistPercent(selectedTask)"
              ></progress>
            </template>

            <div class="space-y-1.5 mb-2">
              <template x-for="item in selectedTask.checklist" :key="item.id">
                <div class="flex items-center gap-2 group">
                  <input
                    type="checkbox"
                    :checked="item.done"
                    @change="toggleChecklistItem(item)"
                    :disabled="!canEditBoard"
                    class="h-4 w-4 rounded accent-blue-500 flex-shrink-0"
                  >
                  <div
                    class="flex flex-1 items-center gap-1.5 min-w-0"
                    :class="linkedChecklistItemContainerClass(item)"
                  >
                    <template x-if="item._editing === true">
                      <input
                        x-model="item._draft_title"
                        x-init="$nextTick(() => { $el.focus(); $el.select(); })"
                        @click.stop
                        @keydown.enter.prevent="saveChecklistItemTitle(item)"
                        @keydown.escape.prevent="cancelChecklistItemEdit(item)"
                        @blur="saveChecklistItemTitle(item)"
                        class="flex-1 min-w-0 border rounded-md px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                      >
                    </template>
                    <template x-if="item._editing !== true">
                      <span
                        class="text-sm min-w-0"
                        :class="linkedChecklistItemTextClass(item)"
                        @click="item.spawned_task_id && openSpawnedTask(item.spawned_task_id)"
                        x-text="item.title"
                        :title="linkedChecklistItemTitle(item)"
                      ></span>
                    </template>
                    <span
                      x-show="item.spawned_task_id && item._editing !== true"
                      class="checklist-linked-icon flex-shrink-0 text-xs"
                      @click="openSpawnedTask(item.spawned_task_id)"
                      title="Open linked objective"
                    >↗</span>
                  </div>
                  <button
                    x-show="canEditBoard && item._editing !== true"
                    @click="startChecklistItemEdit(item)"
                    class="text-gray-200 hover:text-gray-500 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0 text-xs"
                    title="Edit item"
                  >✎</button>
                  <button
                    x-show="canEditBoard"
                    @click="deleteChecklistItem(item)"
                    class="text-gray-200 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0"
                    title="Delete item"
                  >×</button>
                </div>
              </template>
            </div>

            <div class="flex gap-2">
              <input
                x-model="newChecklistItem"
                @keydown.enter="addChecklistItem()"
                @keydown.escape="newChecklistItem = ''"
                :disabled="!canEditBoard"
                placeholder="Add an item..."
                class="flex-1 border rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
              >
              <button
                x-show="canEditBoard"
                @click="addChecklistItem()"
                class="bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm px-3 py-1.5 rounded-lg transition-colors"
              >Add</button>
            </div>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- ===== Log Config Modal ===== -->
  <div
    x-show="showLogConfig"
    x-transition:enter="transition ease-out duration-150"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-100"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4"
    @click.self="showLogConfig = false"
  >
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md" @click.stop>
      <template x-if="logConfigStage">
        <div class="p-6">
          <div class="flex items-center justify-between mb-5">
            <h2 class="text-lg font-bold text-gray-800">Stage Settings</h2>
            <button @click="showLogConfig = false" class="text-gray-400 hover:text-gray-600 text-xl leading-none">×</button>
          </div>

          <label class="flex items-center gap-2 text-sm text-gray-700 mb-4">
            <input type="checkbox" x-model="logConfigStage.is_log" class="h-4 w-4 rounded accent-sky-500">
            Log stage
          </label>

          <div x-show="logConfigStage.is_log" class="space-y-3">
            <div>
              <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Saved Filter</label>
              <select :key="logConfigSelectKey()" x-model="logConfigStage.filter_id" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400">
                <option value="" :selected="isLogConfigAllSelected">All objectives</option>
                <template x-for="savedFilter in savedFilters" :key="savedFilter.id">
                  <option :value="asString(savedFilter.id)" :selected="isLogConfigFilterSelected(savedFilter)" x-text="savedFilter.name"></option>
                </template>
              </select>
              <a :href="logConfigFiltersHref" class="inline-block mt-2 text-xs text-sky-600 hover:text-sky-700">Manage filters</a>
              <p x-show="showLogConfigFiltersEmptyState" class="mt-2 text-xs text-gray-400">No saved filters yet.</p>
            </div>
          </div>

          <div class="flex justify-end gap-2 border-t pt-4 mt-5">
            <button @click="showLogConfig = false" class="text-gray-500 hover:text-gray-700 px-4 py-2 text-sm">Cancel</button>
            <button @click="saveLogConfig()" class="bg-sky-500 hover:bg-sky-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">Save</button>
          </div>
        </div>
      </template>
    </div>
  </div>

</div>


<script src="/static/board.js"></script>

{% endblock %}
