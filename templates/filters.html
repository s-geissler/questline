{% extends "base.html" %}
{% block content %}

<div
  id="filters-page"
  class="max-w-5xl mx-auto p-6"
  data-board-id="{{ board.id }}"
  data-board-role='{{ board_role | tojson }}'
  data-boards='{{ boards | tojson }}'
  data-current-user='{{ filter_current_user | tojson }}'
  data-assignee-options='{{ filter_assignee_options | tojson }}'
>
  <div id="filters-readonly-banner" class="hidden mb-6 bg-white/85 text-slate-700 text-sm rounded-xl px-4 py-3 shadow">
    Read-only access. Viewers can inspect saved filters but cannot change them.
  </div>

  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-white">Filters</h1>
    <button
      id="filters-new-button"
      type="button"
      class="hidden bg-white text-blue-700 font-semibold px-4 py-2 rounded-lg hover:bg-blue-50 transition-colors shadow"
    >+ New Filter</button>
  </div>

  <div id="filters-editor-container"></div>
  <div id="filters-list-container" class="space-y-3"></div>
  <p id="filters-empty-state" class="hidden text-white text-center opacity-70 py-8">
    No filters yet. Create one to drive log stages.
  </p>
</div>

<script src="/static/filters.js"></script>

{% endblock %}
